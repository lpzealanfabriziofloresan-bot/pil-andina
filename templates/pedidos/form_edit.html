{% extends "base.html" %}
{% block title %}Editar Pedido{% endblock %}
{% block content %}

<h1>Editar Pedido #{{ pedido.id_pedido }}</h1>

<form method="POST" style="max-width:520px;">
  <label>Fecha de entrega requerida</label>
  <input type="date" name="fecha_entrega_req" value="{{ pedido.fecha_entrega_req }}" required>

  <label>Notas</label>
  <textarea name="notas" rows="3">{{ pedido.notas or '' }}</textarea>

  <div class="btn-group" style="margin-top:8px;">
    <button type="submit">Guardar cambios</button>
    <a href="{{ url_for('pedidos.lista') }}" class="btn btn-outline">Cancelar</a>
  </div>
</form>
{% endblock %}
